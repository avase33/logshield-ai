name: logshield-infra

# Local multi-service backing infrastructure for LogShield-AI:
# Kafka (streaming bus), ClickHouse (time-series store), Redis, Qdrant (vector DB),
# Prometheus + Grafana. The engine runs offline-first, so this stands up what the
# production adapters point at.

services:
  logshield:
    build: .
    environment:
      LOGSHIELD_BUS: kafka
      KAFKA_BROKERS: kafka:9092
      LOGSHIELD_STORAGE: clickhouse
      CLICKHOUSE_URL: http://clickhouse:8123
      LOGSHIELD_VECTOR: qdrant
      QDRANT_URL: http://qdrant:6333
    ports: ["8000:8000"]
    depends_on: [kafka, clickhouse, qdrant]

  zookeeper:
    image: bitnami/zookeeper:3.9
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"

  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_NUM_PARTITIONS: "24"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports: ["9092:9092"]
    depends_on: [zookeeper]

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports: ["8123:8123", "9000:9000"]
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    volumes: ["clickhouse-data:/var/lib/clickhouse"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["qdrant-data:/qdrant/storage"]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deployment/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./deployment/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./deployment/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./deployment/grafana-dashboard.json:/var/lib/grafana/dashboards/logshield.json:ro
    ports: ["3000:3000"]
    depends_on: [prometheus]

volumes:
  clickhouse-data:
  qdrant-data:
