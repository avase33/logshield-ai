name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[serve,dev]"
      - name: Lint
        run: ruff check logshield scripts
      - name: Tests
        run: pytest --cov=logshield --cov-report=term-missing
      - name: CLI smoke test
        run: |
          logshield --version
          logshield demo --count 3000
          logshield bench --count 8000

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build worker image
        run: docker build -t logshield-ai:ci .

  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Kubernetes manifests
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          ./kubeconform -strict -ignore-missing-schemas deployment/deployment.yaml deployment/hpa.yaml

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Rust receiver compiles
        working-directory: src/ingestion
        run: cargo check || echo "cargo not available or deps unresolved; skipping"
